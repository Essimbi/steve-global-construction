<section class="featured-products section">
  <div class="container header-flex">
    <div class="title-group">
      <span class="label">Catalogue</span>
      <h2 class="display-text gold-gradient-text">Nos produits phares</h2>
    </div>
    <a routerLink="/produits" class="btn btn-outline desktop-only">Voir tous les produits</a>
  </div>

  <div class="products-container container">
    <div class="products-scroll">
      @for (product of products; track product.id) {
        <div class="product-card">
          <div class="product-image">
            <img [src]="product.image" [alt]="product.name">
            <span class="category-badge">{{ product.category }}</span>
          </div>
          <div class="product-info">
            <h3 class="product-name">{{ product.name }}</h3>
            <button class="btn btn-whatsapp full-width" (click)="onOrder(product)">
              Commander sur WhatsApp
            </button>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="container mobile-only text-center mt-4">
    <a routerLink="/produits" class="btn btn-outline full-width">Voir tous les produits</a>
  </div>
</section>
